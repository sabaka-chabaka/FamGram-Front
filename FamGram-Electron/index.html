<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FamGram</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
<div id="app">

  <div id="auth-screen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-mark">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
            <path d="M18 3L32 10V26L18 33L4 26V10L18 3Z" fill="#3b82f6" opacity="0.15"/>
            <path d="M18 3L32 10V26L18 33L4 26V10L18 3Z" stroke="#3b82f6" stroke-width="1.5"/>
            <circle cx="18" cy="18" r="5" fill="#3b82f6"/>
            <line x1="18" y1="8" x2="18" y2="13" stroke="#3b82f6" stroke-width="1.5"/>
            <line x1="18" y1="23" x2="18" y2="28" stroke="#3b82f6" stroke-width="1.5"/>
            <line x1="9" y1="13" x2="14" y2="15.5" stroke="#3b82f6" stroke-width="1.5"/>
            <line x1="22" y1="20.5" x2="27" y2="23" stroke="#3b82f6" stroke-width="1.5"/>
            <line x1="27" y1="13" x2="22" y2="15.5" stroke="#3b82f6" stroke-width="1.5"/>
            <line x1="14" y1="20.5" x2="9" y2="23" stroke="#3b82f6" stroke-width="1.5"/>
          </svg>
        </div>
        <span class="logo-text">FamGram</span>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Войти</button>
        <button class="auth-tab" data-tab="register">Регистрация</button>
      </div>

      <div id="login-form" class="auth-form active">
        <div class="field">
          <label>Имя пользователя</label>
          <input type="text" id="login-username" placeholder="username" autocomplete="username"/>
        </div>
        <div class="field">
          <label>Пароль</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
        </div>
        <div id="login-error" class="auth-error"></div>
        <button id="login-btn" class="auth-submit">Войти</button>
      </div>

      <div id="register-form" class="auth-form">
        <div class="field">
          <label>Имя пользователя</label>
          <input type="text" id="reg-username" placeholder="username"/>
        </div>
        <div class="field">
          <label>Отображаемое имя</label>
          <input type="text" id="reg-displayname" placeholder="Иван Иванов"/>
        </div>
        <div class="field">
          <label>Пароль</label>
          <input type="password" id="reg-password" placeholder="минимум 6 символов"/>
        </div>
        <div id="reg-error" class="auth-error"></div>
        <button id="reg-btn" class="auth-submit">Создать аккаунт</button>
      </div>
    </div>
  </div>

  <div id="main-app" class="main-app hidden">

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="current-user">
          <div class="avatar" id="my-avatar"></div>
          <div class="my-info">
            <div class="my-name" id="my-name"></div>
            <div class="my-username" id="my-username"></div>
          </div>
        </div>
        <button class="icon-btn" id="new-chat-btn" title="Новый чат">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"/>
          </svg>
        </button>
        <button class="icon-btn logout-btn" id="logout-btn" title="Выйти">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
          </svg>
        </button>
      </div>

      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="search-input" placeholder="Поиск или новый чат…"/>
      </div>

      <div class="chat-list" id="chat-list">
        <div class="chat-list-empty">Загрузка чатов…</div>
      </div>
    </div>

    <div class="chat-area">
      <div id="empty-state" class="empty-state">
        <div class="empty-icon">
          <svg width="64" height="64" viewBox="0 0 36 36" fill="none">
            <path d="M18 3L32 10V26L18 33L4 26V10L18 3Z" fill="#3b82f6" opacity="0.08"/>
            <path d="M18 3L32 10V26L18 33L4 26V10L18 3Z" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
            <circle cx="18" cy="18" r="4" fill="#3b82f6" opacity="0.3"/>
          </svg>
        </div>
        <p>Выберите чат или начните новый</p>
      </div>

      <div id="chat-view" class="chat-view hidden">
        <div class="chat-header">
          <div class="chat-header-info">
            <div class="avatar small" id="chat-avatar"></div>
            <div>
              <div class="chat-header-name" id="chat-header-name"></div>
              <div class="chat-header-sub" id="chat-header-sub"></div>
            </div>
          </div>
          <div class="header-actions">
            <div class="encryption-badge">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              AES-GCM
            </div>
          </div>
        </div>

        <div class="messages" id="messages-container">
          <div class="messages-loading">Загрузка…</div>
        </div>

        <div class="input-area">
          <input type="text" id="message-input" placeholder="Написать сообщение…" autocomplete="off"/>
          <button id="send-btn" class="send-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="new-chat-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-card">
      <div class="modal-header">
        <span>Новый чат</span>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <input type="text" id="user-search" placeholder="Поиск пользователей…" class="modal-input"/>
      <div id="user-results" class="user-results"></div>
    </div>
  </div>

</div>
<script type="module" src="src/main.ts"></script>
</body>
</html>
